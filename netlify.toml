# Repo root — site lives in Webpage/
[build]
  base = "Webpage"
  command = "npm run build"
  publish = "Webpage"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/wallpapers.json"
  [headers.values]
    Cache-Control = "public, max-age=60"
