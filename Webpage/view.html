<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallpaper — WallDrop</title>
<link rel="icon" href="icons/logo.png?v=4" type="image/png">
<link rel="apple-touch-icon" href="icons/icon.png?v=4">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="brand.css">
<link rel="stylesheet" href="loader.css">
<link rel="stylesheet" href="mobile.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--border:#1f1f1f;--border-light:#2a2a2a;
  --white:#f5f5f5;--silver:#a0a0a0;--dim:#555;
}
body{
  background:var(--bg);color:var(--silver);
  font-family:'Inter',sans-serif;font-size:14px;line-height:1.6;
  min-height:100vh;
}
nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2rem;height:60px;border-bottom:1px solid var(--border);
  background:rgba(8,8,8,0.9);backdrop-filter:blur(20px);
}
nav a{color:var(--silver);text-decoration:none;font-size:0.72rem;
  letter-spacing:0.1em;text-transform:uppercase}
nav a:hover{color:var(--white)}
.logo .logo-text{color:var(--white)}
.view-wrap{
  max-width:1400px;margin:0 auto;padding:2rem 1.5rem 3rem;
  animation:viewIn 0.55s cubic-bezier(0.34,1.1,0.64,1) both;
}
@keyframes viewIn{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}
@media(prefers-reduced-motion:reduce){
  .view-wrap{animation:none}
}
.view-img-wrap{
  background:#0e0e0e;border:1px solid var(--border-light);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  padding:1rem;min-height:120px;
}
.view-img{
  display:block;
  width:auto;height:auto;
  max-width:100%;
  max-height:calc(100vh - 220px);
  object-fit:contain;
  object-position:center;
}
.view-dims{
  font-size:0.75rem;color:var(--dim);margin-top:0.5rem;
  font-variant-numeric:tabular-nums;
}
.view-meta{
  margin-top:1.5rem;display:flex;flex-wrap:wrap;
  align-items:flex-end;justify-content:space-between;gap:1rem;
}
.view-meta h1{
  font-family:'Outfit',sans-serif;font-size:1.5rem;font-weight:600;
  color:var(--white);letter-spacing:-0.02em;
}
.view-meta p{font-size:0.8rem;color:var(--dim);margin-top:0.35rem}
.view-actions{display:flex;gap:0.6rem;flex-wrap:wrap;align-items:center}
.view-quality-label{font-size:0.62rem;color:var(--dim);letter-spacing:0.1em;text-transform:uppercase}
.view-quality{
  background:#0e0e0e;border:1px solid var(--border-light);color:var(--silver);
  padding:0.45rem 0.6rem;border-radius:8px;font-size:0.72rem;min-height:44px;
}
.view-dl-stat{font-size:0.72rem;color:var(--dim);margin-top:0.5rem}
.dl-btn{
  background:var(--white);color:#080808;border:none;
  padding:0.6rem 1.5rem;border-radius:8px;
  font-family:'Inter',sans-serif;font-size:0.72rem;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;
}
.dl-btn:hover{opacity:0.9}
.dl-btn.done{background:#4ade80;color:#052e16}
.btn-ghost{
  background:transparent;border:1px solid var(--border-light);
  color:var(--silver);padding:0.6rem 1.2rem;border-radius:8px;
  font-size:0.72rem;text-decoration:none;letter-spacing:0.08em;text-transform:uppercase;
}
.btn-ghost:hover{border-color:var(--silver);color:var(--white)}
.view-error{padding:4rem 2rem;text-align:center;color:var(--dim)}
.view-error a{color:var(--white)}
@media(max-width:768px){
  nav{padding:0 1rem}
  .view-wrap{padding:1rem 1rem 2rem}
  .view-meta{flex-direction:column;align-items:stretch}
  .view-actions{width:100%}
  .view-quality,.dl-btn{flex:1;min-width:0}
  .view-img{max-height:calc(100vh - 280px)}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo" aria-label="WallDrop home">
    <img src="icons/logo.png?v=4" alt="" class="site-logo" width="42" height="42">
    <span class="logo-text">WallDrop</span>
  </a>
  <a href="index.html">← Back to browse</a>
</nav>

<main class="view-wrap" id="viewMain">
  <p class="view-error">Loading…</p>
</main>

<script src="loader.js"></script>
<script src="downloads-sync.js"></script>
<script src="view.js"></script>
</body>
</html>
